name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release-aarch64"

      - name: Build
        run: cargo build --release -p nav-cli

      - name: Package
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p dist
          cp target/release/nav dist/
          tar -czf "nav-${VERSION}-aarch64-apple-darwin.tar.gz" -C dist nav
          shasum -a 256 "nav-${VERSION}-aarch64-apple-darwin.tar.gz" | cut -d" " -f1 \
            > "nav-${VERSION}-aarch64-apple-darwin.tar.gz.sha256"

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          ASSETS=(
            "nav-${VERSION}-aarch64-apple-darwin.tar.gz"
            "nav-${VERSION}-aarch64-apple-darwin.tar.gz.sha256"
          )

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${ASSETS[@]}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" --generate-notes "${ASSETS[@]}"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
