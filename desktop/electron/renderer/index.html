<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>nav</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar" aria-label="Sidebar">
        <div class="sidebar-header">
          <h1 class="sidebar-brand">nav</h1>
          <button type="button" id="new-chat" class="new-chat" disabled>
            + New chat
          </button>
        </div>

        <nav class="sidebar-section" aria-label="Sessions">
          <h2 class="sidebar-section-title">Sessions</h2>
          <ul class="session-list" id="session-list"></ul>
        </nav>

        <!-- Future sidebar sections (Settings, Plugins, Automations) mount here. -->
        <div class="sidebar-footer"></div>
      </aside>

      <main class="shell">
        <section class="chat" aria-label="Chat transcript">
          <ol class="message-list" id="message-list"></ol>
        </section>

        <form class="composer" id="composer">
          <div class="composer-row">
            <input
              type="text"
              id="composer-input"
              class="composer-input"
              placeholder="Send a message…"
              autocomplete="off"
              disabled
            />
            <button
              type="submit"
              id="composer-send"
              class="composer-send"
              disabled
            >
              Send
            </button>
          </div>
          <span class="composer-model" id="composer-model" aria-live="polite"></span>
        </form>
      </main>
    </div>
    <!-- Markdown for assistant turns: marked parses, DOMPurify sanitizes.
         Vendored UMD builds so the renderer stays self-contained over file://. -->
    <script src="./vendor/marked.umd.js"></script>
    <script src="./vendor/purify.min.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
