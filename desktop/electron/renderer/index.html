<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>nav</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>nav</h1>
          <p id="session-id">Waiting for backend</p>
        </div>
        <div class="status" id="backend-status">Starting</div>
      </header>

      <section class="chat" aria-label="Chat transcript">
        <ol class="message-list" id="message-list"></ol>
      </section>

      <form class="composer" id="composer">
        <input
          type="text"
          id="composer-input"
          class="composer-input"
          placeholder="Send a message…"
          autocomplete="off"
          disabled
        />
        <button type="submit" id="composer-send" class="composer-send" disabled>
          Send
        </button>
      </form>
    </main>
    <script src="./renderer.js"></script>
  </body>
</html>
