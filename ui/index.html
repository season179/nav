<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nav</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Navigation">
        <div class="traffic-spacer"></div>

        <nav class="primary-nav" aria-label="Primary">
          <button class="nav-action" type="button">
            <span class="icon" aria-hidden="true">✎</span>
            <span>New session</span>
          </button>
        </nav>

        <section class="sidebar-section projects" aria-labelledby="projects-title">
          <h2 id="projects-title">Projects</h2>
          <button
            class="project-toggle"
            type="button"
            aria-expanded="true"
            aria-controls="project-sessions"
          >
            <span class="folder" aria-hidden="true">▱</span>
            <span class="project-name">No project selected</span>
            <span class="project-chevron" aria-hidden="true">⌄</span>
          </button>
          <div id="project-sessions" class="session-list" aria-label="Sessions"></div>
        </section>
      </aside>

      <main class="main-panel">
        <header class="top-bar" aria-label="Workspace controls">
          <div class="window-title">nav</div>
        </header>

        <section class="hero-compose" aria-label="New coding session">
          <h1>What should we work on?</h1>

          <form class="composer">
            <label class="sr-only" for="prompt">Prompt</label>
            <textarea
              id="prompt"
              rows="2"
              placeholder="Ask nav anything. @ to mention files"
            ></textarea>

            <div class="composer-toolbar">
              <div class="toolbar-right">
                <button class="send-button" type="submit" aria-label="Send">
                  ↑
                </button>
              </div>
            </div>
          </form>

          <div class="workspace-strip" aria-label="Session context">
            <button class="workspace-strip-button" type="button">
              <span aria-hidden="true">▱</span>
              <span class="workspace-name">Select working directory</span>
            </button>
            <button type="button">
              <span aria-hidden="true">⑂</span>
              main
              <span aria-hidden="true">⌄</span>
            </button>
          </div>
        </section>
      </main>
    </div>
    <script src="./renderer.js"></script>
  </body>
</html>
