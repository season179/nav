[workspace]
members = ["crates/nav-core", "crates/nav-cli", "crates/nav-tui"]
default-members = ["crates/nav-cli"]
resolver = "2"

[workspace.package]
version = "26.5.7"
edition = "2024"

[workspace.dependencies]
anyhow = "1.0.98"
clap = { version = "4.5.38", features = ["derive"] }
crossterm = "0.29"
dirs = "5.0.1"
futures-util = "0.3.32"
insta = "1.47"
ratatui = "0.30"
reqwest = { version = "0.12.15", features = ["json", "stream", "rustls-tls"], default-features = false }
rusqlite = { version = "0.32.1", features = ["bundled"] }
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.140"
serde_yaml = "0.9.34"
sha2 = "0.10"
similar = "2.7.0"
tokio = { version = "1.45.0", features = ["io-std", "io-util", "macros", "process", "rt-multi-thread", "sync", "time"] }
tracing = "0.1"
tokio-tungstenite = { version = "0.26.2", features = ["rustls-tls-webpki-roots"] }
tempfile = "3"
ulid = "1.1.3"
