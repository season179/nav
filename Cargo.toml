[package]
name = "nav"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.98"
clap = { version = "4.5.38", features = ["derive"] }
futures-util = "0.3.32"
reqwest = { version = "0.12.15", features = ["json", "stream", "rustls-tls"], default-features = false }
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.140"
tokio = { version = "1.45.0", features = ["macros", "process", "rt-multi-thread", "time"] }
